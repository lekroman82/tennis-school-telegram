<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Админ-панель</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 0 16px 80px;
    }

    /* --- Tabs --- */
    .tabs {
      display: flex;
      gap: 0;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--tg-theme-bg-color, #ffffff);
      padding: 12px 0 0;
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--tg-theme-hint-color, #999);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--tg-theme-button-color, #2AABEE);
      border-bottom-color: var(--tg-theme-button-color, #2AABEE);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* --- Date picker --- */
    .dates {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 16px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .dates::-webkit-scrollbar { display: none; }

    .date-btn {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 12px;
      border-radius: 12px;
      border: 2px solid var(--tg-theme-hint-color, #999);
      background: transparent;
      color: var(--tg-theme-text-color, #000);
      font-size: 13px;
      cursor: pointer;
      min-width: 56px;
      transition: all 0.2s;
    }
    .date-btn.active {
      border-color: var(--tg-theme-button-color, #2AABEE);
      background: var(--tg-theme-button-color, #2AABEE);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .date-btn .day-name { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }
    .date-btn .day-num { font-size: 16px; font-weight: 700; }
    .date-btn.today .day-name { font-weight: 600; opacity: 1; }

    /* --- Service cards --- */
    .service-card {
      background: var(--tg-theme-secondary-bg-color, #f4f4f5);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .service-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .service-emoji { font-size: 24px; }
    .service-info { flex: 1; }
    .service-title { font-size: 15px; font-weight: 600; }
    .service-meta { font-size: 12px; color: var(--tg-theme-hint-color, #999); }

    /* --- Time grid --- */
    .time-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    .time-slot {
      position: relative;
      width: calc(25% - 6px);
      padding: 10px 4px;
      border-radius: 10px;
      border: 2px solid var(--tg-theme-hint-color, #ccc);
      background: transparent;
      color: var(--tg-theme-text-color, #000);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .time-slot.active {
      border-color: #34c759;
      background: #34c75920;
      color: #34c759;
    }
    .time-slot.booked {
      border-color: #ff9500;
      background: #ff950020;
      color: #ff9500;
      cursor: default;
    }
    .time-slot.booked::after {
      content: '';
      position: absolute;
      top: 4px; right: 4px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ff9500;
    }
    .time-slot:active:not(.booked) { transform: scale(0.95); }

    /* --- Legend --- */
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; border: 2px solid; }
    .legend-dot.free { border-color: #34c759; background: #34c75920; }
    .legend-dot.has-booking { border-color: #ff9500; background: #ff950020; }
    .legend-dot.empty { border-color: var(--tg-theme-hint-color, #ccc); }

    /* --- Bookings tab --- */
    .bookings-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .bookings-filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--tg-theme-hint-color, #ccc);
      background: transparent;
      color: var(--tg-theme-text-color, #000);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      border-color: var(--tg-theme-button-color, #2AABEE);
      background: var(--tg-theme-button-color, #2AABEE);
      color: var(--tg-theme-button-text-color, #fff);
    }

    .booking-card {
      background: var(--tg-theme-secondary-bg-color, #f4f4f5);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .booking-card__top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .booking-card__client {
      font-size: 15px;
      font-weight: 600;
    }
    .booking-card__status {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .booking-card__status.confirmed {
      background: #34c75920;
      color: #34c759;
    }
    .booking-card__status.cancelled {
      background: #ff3b3020;
      color: #ff3b30;
    }
    .booking-card__status.completed {
      background: #007aff20;
      color: #007aff;
    }
    .booking-card__details {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #999);
      line-height: 1.6;
    }
    .booking-card__details span {
      color: var(--tg-theme-text-color, #000);
    }
    .booking-card__phone {
      margin-top: 6px;
      font-size: 13px;
    }
    .booking-card__phone a {
      color: var(--tg-theme-link-color, #2AABEE);
      text-decoration: none;
    }
    .booking-card__actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .booking-card__actions button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-complete {
      background: #34c75920;
      color: #34c759;
    }
    .btn-cancel {
      background: #ff3b3020;
      color: #ff3b30;
    }

    .bookings-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--tg-theme-hint-color, #999);
      font-size: 14px;
    }

    /* --- Loading & Toast --- */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999);
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--tg-theme-text-color, #000);
      color: var(--tg-theme-bg-color, #fff);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 100;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.visible {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="schedule">Расписание</button>
    <button class="tab-btn" data-tab="bookings">Записи клиентов</button>
  </div>

  <!-- Tab: Schedule -->
  <div class="tab-content active" id="tab-schedule">
    <div class="dates" id="dates"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot free"></div> Свободно</div>
      <div class="legend-item"><div class="legend-dot has-booking"></div> Есть записи</div>
      <div class="legend-item"><div class="legend-dot empty"></div> Нет слота</div>
    </div>
    <div id="services">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <!-- Tab: Bookings -->
  <div class="tab-content" id="tab-bookings">
    <div class="bookings-filters" id="bookings-filters">
      <button class="filter-btn active" data-status="">Все</button>
      <button class="filter-btn" data-status="confirmed">Активные</button>
      <button class="filter-btn" data-status="completed">Завершённые</button>
      <button class="filter-btn" data-status="cancelled">Отменённые</button>
    </div>
    <div id="bookings-list">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const API_URL = 'https://tennis-slot.ru';
const initData = tg.initData;

const DAY_NAMES = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
const MONTH_NAMES = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
const STATUS_LABELS = { confirmed: 'Активна', cancelled: 'Отменена', completed: 'Завершена' };

const HOURS = [];
for (let h = 10; h <= 20; h++) {
  HOURS.push(`${String(h).padStart(2, '0')}:00`);
}

let services = [];
let selectedDate = null;
let existingSlots = [];
let allBookings = [];
let bookingsFilter = '';

// --- API helper ---
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'X-Telegram-Init-Data': initData,
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(API_URL + path, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.detail || resp.statusText);
  }
  return resp.json();
}

// ========== TABS ==========
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');

    if (btn.dataset.tab === 'bookings') loadBookings();
  });
});

// ========== SCHEDULE TAB ==========
async function init() {
  renderDates();
  try {
    services = await api('GET', '/api/admin/services');
    services = services.filter(s => s.is_active);
  } catch (e) {
    document.getElementById('services').innerHTML =
      `<div class="loading">Ошибка: ${e.message}</div>`;
    return;
  }
  const todayBtn = document.querySelector('.date-btn.today');
  if (todayBtn) todayBtn.click();
}

function renderDates() {
  const container = document.getElementById('dates');
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (i === 0 ? ' today' : '');
    btn.innerHTML = `
      <span class="day-name">${i === 0 ? 'Сегодня' : DAY_NAMES[d.getDay()]}</span>
      <span class="day-num">${d.getDate()}</span>
      <span class="day-name">${MONTH_NAMES[d.getMonth()]}</span>
    `;
    const dateStr = fmtDate(d);
    btn.addEventListener('click', () => selectDate(dateStr, btn));
    container.appendChild(btn);
  }
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function selectDate(dateStr, btn) {
  selectedDate = dateStr;
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  await loadSlots();
}

async function loadSlots() {
  document.getElementById('services').innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    existingSlots = await api('GET', `/api/admin/schedule?date_from=${selectedDate}&date_to=${selectedDate}`);
  } catch (e) {
    existingSlots = [];
  }
  renderServices();
}

function renderServices() {
  const container = document.getElementById('services');
  if (!services.length) {
    container.innerHTML = '<div class="loading">Нет активных услуг</div>';
    return;
  }
  container.innerHTML = '';
  services.forEach(service => {
    const card = document.createElement('div');
    card.className = 'service-card';
    const duration = service.duration_minutes || 60;
    const price = service.price ? `${service.price} руб` : 'Бесплатно';
    card.innerHTML = `
      <div class="service-header">
        <span class="service-emoji">${service.emoji || ''}</span>
        <div class="service-info">
          <div class="service-title">${service.title}</div>
          <div class="service-meta">${duration} мин / ${price} / макс. ${service.max_participants || 1} чел.</div>
        </div>
      </div>
      <div class="time-grid"></div>
    `;
    container.appendChild(card);
    renderTimeGrid(card.querySelector('.time-grid'), service);
  });
}

function renderTimeGrid(grid, service) {
  const duration = service.duration_minutes || 60;
  HOURS.forEach(startTime => {
    const [h, m] = startTime.split(':').map(Number);
    const endMin = h * 60 + m + duration;
    if (endMin > 21 * 60) return;
    const endTime = `${String(Math.floor(endMin/60)).padStart(2,'0')}:${String(endMin%60).padStart(2,'0')}`;

    const slot = existingSlots.find(s =>
      s.service_id === service.id &&
      s.start_time && s.start_time.substring(0, 5) === startTime &&
      !s.is_cancelled
    );

    const btn = document.createElement('button');
    btn.className = 'time-slot';
    btn.textContent = startTime;
    if (slot) {
      btn.classList.add(slot.booked_count > 0 ? 'booked' : 'active');
    }
    btn.addEventListener('click', () => toggleSlot(btn, service, startTime, endTime, slot));
    grid.appendChild(btn);
  });
}

async function toggleSlot(btn, service, startTime, endTime, existingSlot) {
  if (existingSlot && existingSlot.booked_count > 0) {
    showToast('Нельзя убрать — есть записи');
    tg.HapticFeedback.notificationOccurred('error');
    return;
  }
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '0.5';
  try {
    if (existingSlot) {
      await api('DELETE', `/api/admin/schedule/slots/${existingSlot.id}`);
      showToast('Слот убран');
    } else {
      await api('POST', '/api/admin/schedule/slots', {
        service_id: service.id,
        date: selectedDate,
        start_time: startTime,
        end_time: endTime,
        max_participants: service.max_participants || 1,
      });
      showToast('Слот добавлен');
    }
    tg.HapticFeedback.impactOccurred('light');
  } catch (e) {
    showToast('Ошибка: ' + e.message);
    tg.HapticFeedback.notificationOccurred('error');
  }
  await loadSlots();
}

// ========== BOOKINGS TAB ==========
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    bookingsFilter = btn.dataset.status;
    renderBookings();
  });
});

async function loadBookings() {
  document.getElementById('bookings-list').innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    allBookings = await api('GET', '/api/admin/bookings');
  } catch (e) {
    document.getElementById('bookings-list').innerHTML =
      `<div class="loading">Ошибка: ${e.message}</div>`;
    return;
  }
  renderBookings();
}

function renderBookings() {
  const container = document.getElementById('bookings-list');
  let list = allBookings;
  if (bookingsFilter) {
    list = list.filter(b => b.status === bookingsFilter);
  }

  if (!list.length) {
    container.innerHTML = '<div class="bookings-empty">Нет записей</div>';
    return;
  }

  container.innerHTML = '';
  list.forEach(b => {
    const card = document.createElement('div');
    card.className = 'booking-card';

    const clientName = [b.user_first_name, b.user_last_name].filter(Boolean).join(' ') || 'Клиент';
    const service = b.services || {};
    const slot = b.schedule_slots || {};
    const statusLabel = STATUS_LABELS[b.status] || b.status;

    let slotDate = slot.date || '';
    let startTime = slot.start_time || '';
    let endTime = slot.end_time || '';
    if (startTime.length > 5) startTime = startTime.substring(0, 5);
    if (endTime.length > 5) endTime = endTime.substring(0, 5);

    // Format date nicely
    let dateStr = slotDate;
    if (slotDate) {
      const d = new Date(slotDate + 'T00:00:00');
      dateStr = `${d.getDate()} ${MONTH_NAMES[d.getMonth()]} (${DAY_NAMES[d.getDay()]})`;
    }

    card.innerHTML = `
      <div class="booking-card__top">
        <div class="booking-card__client">${service.emoji || ''} ${clientName}</div>
        <div class="booking-card__status ${b.status}">${statusLabel}</div>
      </div>
      <div class="booking-card__details">
        Услуга: <span>${service.title || '—'}</span><br>
        Дата: <span>${dateStr}</span><br>
        Время: <span>${startTime}${endTime ? '–' + endTime : ''}</span>
      </div>
      ${b.user_phone ? `<div class="booking-card__phone">Тел: <a href="tel:${b.user_phone}">${b.user_phone}</a></div>` : ''}
      ${b.comment ? `<div class="booking-card__details" style="margin-top:4px">Комментарий: <span>${b.comment}</span></div>` : ''}
      ${b.status === 'confirmed' ? `
        <div class="booking-card__actions">
          <button class="btn-complete" onclick="updateBookingStatus('${b.id}', 'completed')">Завершить</button>
          <button class="btn-cancel" onclick="updateBookingStatus('${b.id}', 'cancelled')">Отменить</button>
        </div>
      ` : ''}
    `;
    container.appendChild(card);
  });
}

async function updateBookingStatus(bookingId, status) {
  try {
    await api('PUT', `/api/admin/bookings/${bookingId}/status`, { status });
    showToast(status === 'completed' ? 'Запись завершена' : 'Запись отменена');
    tg.HapticFeedback.impactOccurred('light');
    await loadBookings();
  } catch (e) {
    showToast('Ошибка: ' + e.message);
    tg.HapticFeedback.notificationOccurred('error');
  }
}

// ========== TOAST ==========
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 2000);
}

// ========== START ==========
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
