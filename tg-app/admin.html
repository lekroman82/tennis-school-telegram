<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Расписание</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 16px;
      padding-bottom: 80px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* --- Date picker --- */
    .dates {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 16px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .dates::-webkit-scrollbar { display: none; }

    .date-btn {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 12px;
      border-radius: 12px;
      border: 2px solid var(--tg-theme-hint-color, #999);
      background: transparent;
      color: var(--tg-theme-text-color, #000);
      font-size: 13px;
      cursor: pointer;
      min-width: 56px;
      transition: all 0.2s;
    }
    .date-btn.active {
      border-color: var(--tg-theme-button-color, #2AABEE);
      background: var(--tg-theme-button-color, #2AABEE);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .date-btn .day-name {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 2px;
    }
    .date-btn .day-num {
      font-size: 16px;
      font-weight: 700;
    }
    .date-btn.today .day-name {
      font-weight: 600;
      opacity: 1;
    }

    /* --- Service cards --- */
    .service-card {
      background: var(--tg-theme-secondary-bg-color, #f4f4f5);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .service-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .service-emoji {
      font-size: 24px;
    }
    .service-info {
      flex: 1;
    }
    .service-title {
      font-size: 15px;
      font-weight: 600;
    }
    .service-meta {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
    }

    /* --- Time grid --- */
    .time-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .time-slot {
      position: relative;
      width: calc(25% - 6px);
      padding: 10px 4px;
      border-radius: 10px;
      border: 2px solid var(--tg-theme-hint-color, #ccc);
      background: transparent;
      color: var(--tg-theme-text-color, #000);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .time-slot.active {
      border-color: #34c759;
      background: #34c75920;
      color: #34c759;
    }
    .time-slot.booked {
      border-color: #ff9500;
      background: #ff950020;
      color: #ff9500;
      cursor: default;
    }
    .time-slot.booked::after {
      content: '';
      position: absolute;
      top: 4px;
      right: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ff9500;
    }
    .time-slot:active:not(.booked) {
      transform: scale(0.95);
    }

    /* --- Loading --- */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999);
      font-size: 14px;
    }

    /* --- Legend --- */
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      border: 2px solid;
    }
    .legend-dot.free { border-color: #34c759; background: #34c75920; }
    .legend-dot.has-booking { border-color: #ff9500; background: #ff950020; }
    .legend-dot.empty { border-color: var(--tg-theme-hint-color, #ccc); }

    /* --- Toast --- */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--tg-theme-text-color, #000);
      color: var(--tg-theme-bg-color, #fff);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 100;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.visible {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <h1>Расписание</h1>

  <div class="dates" id="dates"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot free"></div> Свободно</div>
    <div class="legend-item"><div class="legend-dot has-booking"></div> Есть записи</div>
    <div class="legend-item"><div class="legend-dot empty"></div> Нет слота</div>
  </div>

  <div id="services">
    <div class="loading">Загрузка...</div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const API_URL = 'https://tennis-slot.ru';
const initData = tg.initData;

const DAY_NAMES = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
const MONTH_NAMES = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];

// Working hours: generate time slots from 10:00 to 20:00
const HOURS = [];
for (let h = 10; h <= 20; h++) {
  HOURS.push(`${String(h).padStart(2, '0')}:00`);
}

let services = [];
let selectedDate = null;
let existingSlots = []; // slots for selected date

// --- API helper ---
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'X-Telegram-Init-Data': initData,
    },
  };
  if (body) opts.body = JSON.stringify(body);

  const resp = await fetch(API_URL + path, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.detail || resp.statusText);
  }
  return resp.json();
}

// --- Init ---
async function init() {
  renderDates();
  try {
    services = await api('GET', '/api/admin/services');
    services = services.filter(s => s.is_active);
  } catch (e) {
    document.getElementById('services').innerHTML =
      `<div class="loading">Ошибка загрузки услуг: ${e.message}</div>`;
    return;
  }

  // Select today
  const todayBtn = document.querySelector('.date-btn.today');
  if (todayBtn) todayBtn.click();
}

// --- Date buttons ---
function renderDates() {
  const container = document.getElementById('dates');
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);

    const btn = document.createElement('button');
    btn.className = 'date-btn' + (i === 0 ? ' today' : '');
    btn.innerHTML = `
      <span class="day-name">${i === 0 ? 'Сегодня' : DAY_NAMES[d.getDay()]}</span>
      <span class="day-num">${d.getDate()}</span>
      <span class="day-name">${MONTH_NAMES[d.getMonth()]}</span>
    `;

    const dateStr = formatDate(d);
    btn.addEventListener('click', () => selectDate(dateStr, btn));
    container.appendChild(btn);
  }
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

async function selectDate(dateStr, btn) {
  selectedDate = dateStr;

  // Update active button
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Load slots
  await loadSlots();
}

async function loadSlots() {
  document.getElementById('services').innerHTML = '<div class="loading">Загрузка...</div>';

  try {
    existingSlots = await api('GET', `/api/admin/schedule?date_from=${selectedDate}&date_to=${selectedDate}`);
  } catch (e) {
    existingSlots = [];
  }

  renderServices();
}

// --- Render services with time grids ---
function renderServices() {
  const container = document.getElementById('services');
  if (!services.length) {
    container.innerHTML = '<div class="loading">Нет активных услуг</div>';
    return;
  }

  container.innerHTML = '';

  services.forEach(service => {
    const card = document.createElement('div');
    card.className = 'service-card';

    const duration = service.duration_minutes || 60;
    const price = service.price ? `${service.price} руб` : 'Бесплатно';

    card.innerHTML = `
      <div class="service-header">
        <span class="service-emoji">${service.emoji || ''}</span>
        <div class="service-info">
          <div class="service-title">${service.title}</div>
          <div class="service-meta">${duration} мин / ${price} / макс. ${service.max_participants || 1} чел.</div>
        </div>
      </div>
      <div class="time-grid" id="grid-${service.id}"></div>
    `;

    container.appendChild(card);

    // Render time slots
    const grid = card.querySelector('.time-grid');
    renderTimeGrid(grid, service);
  });
}

function renderTimeGrid(grid, service) {
  const duration = service.duration_minutes || 60;

  HOURS.forEach(startTime => {
    // Calculate end time
    const [h, m] = startTime.split(':').map(Number);
    const endMinutes = h * 60 + m + duration;
    // Skip if end time goes beyond 21:00
    if (endMinutes > 21 * 60) return;

    const endH = String(Math.floor(endMinutes / 60)).padStart(2, '0');
    const endM = String(endMinutes % 60).padStart(2, '0');
    const endTime = `${endH}:${endM}`;

    // Find existing slot
    const slot = existingSlots.find(s =>
      s.service_id === service.id &&
      s.start_time && s.start_time.substring(0, 5) === startTime &&
      !s.is_cancelled
    );

    const btn = document.createElement('button');
    btn.className = 'time-slot';
    btn.textContent = startTime;

    if (slot) {
      if (slot.booked_count > 0) {
        btn.classList.add('booked');
        btn.title = `Записей: ${slot.booked_count}`;
        btn.textContent = startTime;
      } else {
        btn.classList.add('active');
      }
    }

    btn.addEventListener('click', () => toggleSlot(btn, service, startTime, endTime, slot));
    grid.appendChild(btn);
  });
}

// --- Toggle slot ---
async function toggleSlot(btn, service, startTime, endTime, existingSlot) {
  if (existingSlot && existingSlot.booked_count > 0) {
    showToast('Нельзя убрать — есть записи');
    tg.HapticFeedback.notificationOccurred('error');
    return;
  }

  btn.style.pointerEvents = 'none';
  btn.style.opacity = '0.5';

  try {
    if (existingSlot) {
      // Delete slot
      await api('DELETE', `/api/admin/schedule/slots/${existingSlot.id}`);
      btn.classList.remove('active');
      // Remove from local cache
      existingSlots = existingSlots.filter(s => s.id !== existingSlot.id);
      // Update click handler — no existing slot anymore
      btn.replaceWith(btn.cloneNode(true));
      const newBtn = document.querySelector(`#grid-${service.id}`).children[
        Array.from(btn.parentNode?.children || []).indexOf(btn)
      ];
      // Easier: just reload
      showToast('Слот убран');
    } else {
      // Create slot
      const result = await api('POST', '/api/admin/schedule/slots', {
        service_id: service.id,
        date: selectedDate,
        start_time: startTime,
        end_time: endTime,
        max_participants: service.max_participants || 1,
      });
      btn.classList.add('active');
      // Add to local cache
      existingSlots.push({ ...result, booked_count: 0 });
      showToast('Слот добавлен');
    }
    tg.HapticFeedback.impactOccurred('light');
  } catch (e) {
    showToast('Ошибка: ' + e.message);
    tg.HapticFeedback.notificationOccurred('error');
  }

  // Reload to refresh state cleanly
  await loadSlots();
}

// --- Toast ---
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 2000);
}

// --- Start ---
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
